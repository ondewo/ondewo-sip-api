#############################################################################################
# pre-commit — language-agnostic hooks for this non-python API repo.                         #
# The .proto files are the source of truth; docs/ is GENERATED (protoc-gen-doc) and must     #
# never be rewritten by a hook. Ruff/mypy/uv are python-only and NOT included here.          #
#############################################################################################

# Never touch generated / vendored code. docs/ (index.html, index.md, style.css) is produced
# by the "Generate API Documentation" CI action from the .proto files.
exclude: '^docs/|(\.pb\.)'

fail_fast: false

repos:

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.23.0
    hooks:
      - id: markdownlint-cli2

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: [ maxkb=1024 ]
      - id: check-json          # validate (does NOT reformat) json/package.json
      - id: check-yaml
      - id: check-xml
      - id: check-merge-conflict
      - id: check-symlinks
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/milin/giticket
    rev: '1.92'
    hooks:
      - id: giticket
        args: [ '--regex=(?:(?:feature|bugfix|support|hotfix)/)?(OND[0-9]{3}-[0-9]{1,5})[_-][\w-]+',
                '--format=[{ticket}] {commit_msg}',
                '--mode=regex_match' ]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [ commit-msg ]
